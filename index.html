    <style>
        #galeria {
            width: 700px;
            height:
                400px;
            position: relative;
        }

        #galeria img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            display: none;
        }

        #galeria img.ativa {
            display: block;
        }
    </style>
    </head>

    <body>

        <div id="galeria">
            <img src="IMG/img03.jpg" class="ativa">
            <img src="IMG/hidro12024.jpg">
            <img src="IMG/1000429880.jpg">
            <img src="IMG/1000429881.jpg">
            <img src="IMG/1000429399.jpg">
            <img src="IMG/projeto1.jpg">
            <img src="IMG/1000429871.jpg">
            <img src="IMG/viagens@.jpg">
            <img src="IMG/1000429861.jpg">

        </div>


        <script>
            const imagens = document.querySelectorAll("#galeria img");
            let atual = 0;

            setInterval(() => {
                imagens[atual].classList.remove("ativa");

                atual++;
                if (atual >= imagens.length) {
                    atual = 0;
                }

                imagens[atual].classList.add("ativa");
            }, 2000); 
        </script>
