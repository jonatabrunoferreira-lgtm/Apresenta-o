<style>
#galeria {
width:500px;
height:
400px;
    position: relative;
}

#galeria img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    display: none;
}

#galeria img.ativa {
    display: block;
}
</style>

<body>

<div id="galeria">
    <img src="IMG/1000429391.jpg" class="ativa">
    <img src="IMG/1000429396.jpg">
    <img src="IMG/1000429397.jpg">
    <img src="IMG/1000429398.jpg">
    <img src="IMG/1000429399.jpg">
    <img src="IMG/1000429402.jpg">
    <img src="IMG/1000429403.jpg">
    
</div>



<script>
const imagens = document.querySelectorAll("#galeria img");
let atual = 0;

setInterval(() => {
    imagens[atual].classList.remove("ativa");

    atual++;
    if (atual >= imagens.length) {
        atual = 0;
    }

    imagens[atual].classList.add("ativa");
}, 2000); 
</script>
