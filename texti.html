<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    margin-top:30px;
}

.container{
    display:flex;
    align-items:center;
    gap:20px;
}

#galeria{
    width:500px;
    height:350px;
    position:relative;
}

#galeria img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    display:none;
    border-radius:10px;
}

#galeria img.ativa{
    display:block;
}

.text-box{
    width:300px;
    font-size:20px;
    padding:20px;
}
</style>
</head>
<body>

<div class="container">
    <div id="galeria">
        <img src="IMG/foto1.jpg" class="ativa" alt="Imagem 1">
        <img src="IMG/foto2.jpg" alt="Imagem 2">
        <img src="IMG/foto3.jpg" alt="Imagem 3">
    </div>

    <div class="text-box" id="textBox">
        Texto da imagem 1
    </div>
</div>

<script>
const imagens = document.querySelectorAll("#galeria img");
const textBox = document.getElementById("textBox");

const textos = [
    "Texto da imagem 1",
    "Texto da imagem 2",
    "Texto da imagem 3"
];

let atual = 0;

setInterval(() => {
    imagens[atual].classList.remove("ativa");

    atual = (atual + 1) % imagens.length;

    imagens[atual].classList.add("ativa");

    textBox.textContent = textos[atual];
}, 3000);
</script>

</body>
</html>
